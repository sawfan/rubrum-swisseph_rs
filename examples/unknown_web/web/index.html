<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rubrum_swisseph unknown_web (wasm32-unknown-unknown)</title>

    <!-- Copy the entire assets directory into dist/assets/ -->
    <link data-trunk rel="copy-dir" href="./assets" />

    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0;
        padding: 16px;
        color: #eee;
        background: #121214;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin: 8px 0;
      }

      label {
        display: inline-flex;
        gap: 6px;
        align-items: center;
      }

      input[type="date"],
      input[type="number"] {
        padding: 6px 8px;
        background: #1d1d22;
        color: #eee;
        border: 1px solid #333;
        border-radius: 6px;
      }

      button {
        padding: 8px 12px;
        font-weight: 600;
        background: #2b2b33;
        color: #eee;
        border: 1px solid #444;
        border-radius: 8px;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      pre {
        background: #0e0e10;
        color: #eee;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        border: 1px solid #24242a;
      }

      .muted {
        color: #9aa0a6;
      }

      #chart svg {
        width: min(720px, 96vw);
        height: auto;
        display: block;
        margin: 12px 0;
      }
    </style>
  </head>
  <body>
    <h1>rubrum_swisseph unknown_web</h1>

    <p class="muted">
      Live chart rendered via <code>rubrum_svg</code> using Swiss Ephemeris positions compiled to
      <code>wasm32-unknown-unknown</code>.
    </p>

    <div class="row">
      <label>
        Date (UTC)
        <input id="date" type="date" />
      </label>

      <label>
        Hour
        <input id="hour" type="number" min="0" max="23" step="1" value="0" />
      </label>

      <label>
        Minute
        <input id="minute" type="number" min="0" max="59" step="1" value="0" />
      </label>

      <label>
        Second
        <input id="second" type="number" min="0" max="59" step="1" value="0" />
      </label>

      <label>
        Lat
        <input id="lat" type="number" min="-90" max="90" step="0.0001" value="37.7749" />
      </label>

      <label>
        Lon
        <input id="lon" type="number" min="-180" max="180" step="0.0001" value="-122.4194" />
      </label>

      <button id="calc">Render chart</button>
      <span id="status">Idle</span>
    </div>

    <div id="chart"></div>

    <h2>Log</h2>
    <pre id="output"></pre>

    <script type="module" data-trunk src="./main.js"></script>
  </body>
</html>
